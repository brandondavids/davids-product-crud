spring.application.name=product-crud

# Konfigurasi database akan ditambahkan saat praktikum JPA
spring.datasource.url=jdbc:postgresql://${PGHOST}:5432/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== Konfigurasi JPA/Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sqp=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect